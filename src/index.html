<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>SECUREX</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
  <meta name="theme-color" content="#0b1120">
  <meta name="color-scheme" content="dark light">
  <meta name="application-name" content="SECUREX">
  <meta name="description" content="Plataforma de seguridad empresarial. Control total de operaciones.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SECUREX">
  <meta name="apple-mobile-web-app-status-bar" content="#0b1120">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="msapplication-TileColor" content="#0b1120">
  <meta name="msapplication-TileImage" content="icons/icon-144x144.png">
  <meta name="msapplication-config" content="none">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https:; connect-src 'self' https://secureapi.jennerorozcoa.dev https://notificationapi.jennerorozcoa.dev https://financial.jennerorozcoa.dev https://crm.jennerorozcoa.dev https://reportapi.jennerorozcoa.dev;">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png">
  <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128x128.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="mask-icon" href="icon512_maskable.png" color="#0b1120">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #0b0202;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    
    .app-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at center, #1a0303 0%, #050000 100%);
      overflow: hidden;
      position: relative;
    }
    
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
      padding: 2.5rem;
      border-radius: 1.5rem;
      background: rgba(26, 4, 4, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(192, 17, 26, 0.15);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 
                  0 0 40px rgba(192, 17, 26, 0.1);
      width: 280px;
      animation: float 4s ease-in-out infinite;
    }
    
    .loader-glow {
      position: absolute;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(192, 17, 26, 0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      filter: blur(10px);
      animation: pulseGlow 2s ease-in-out infinite alternate;
    }
    
    .logo-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    
    .logo-shield {
      width: 50px;
      height: 50px;
      color: #c0111a;
      filter: drop-shadow(0 0 10px rgba(192, 17, 26, 0.6));
      animation: pulseLogo 2s ease-in-out infinite alternate;
    }
    
    .loader-brand {
      color: #ffffff;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }
    
    .spinner-wrapper {
      position: relative;
      width: 60px;
      height: 60px;
      margin-bottom: 1.5rem;
    }
    
    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top: 3px solid #c0111a;
      border-right: 3px solid rgba(192, 17, 26, 0.2);
      border-radius: 50%;
      animation: spinClockwise 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    
    .spinner-ring.inner {
      width: 80%;
      height: 80%;
      top: 10%;
      left: 10%;
      border: 3px solid transparent;
      border-bottom: 3px solid #3b82f6;
      border-left: 3px solid rgba(59, 130, 246, 0.2);
      animation: spinCounterClockwise 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    
    .loader-status {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-align: center;
      animation: pulseText 1.5s ease-in-out infinite alternate;
    }
    
    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes spinCounterClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    @keyframes pulseGlow {
      0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }
    
    @keyframes pulseLogo {
      0% { transform: scale(0.95); filter: drop-shadow(0 0 8px rgba(192, 17, 26, 0.4)); }
      100% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(192, 17, 26, 0.8)); }
    }
    
    @keyframes pulseText {
      0% { opacity: 0.5; }
      100% { opacity: 0.9; }
    }
  </style>
</head>

<body>
  <app-root>
    <div class="app-loading">
      <div class="loader-container">
        <div class="loader-glow"></div>
        <div class="logo-box">
          <div class="logo-shield">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="loader-brand">SECUREX</span>
        </div>
        <div class="spinner-wrapper">
          <div class="spinner-ring"></div>
          <div class="spinner-ring inner"></div>
        </div>
        <div class="loader-status">Iniciando sistema seguro...</div>
      </div>
    </div>
  </app-root>
  <noscript>
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0b1120;color:#fff;font-family:Inter,sans-serif;text-align:center;padding:20px;">
      <div>
        <h2>Habilita JavaScript</h2>
        <p>Para usar SECUREX necesitas habilitar JavaScript en tu navegador.</p>
      </div>
    </div>
  </noscript>
</body>

</html>
