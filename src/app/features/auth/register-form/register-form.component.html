<form (ngSubmit)="submit()" class="form-body">
    <div class="auth-field-wrap">
        <app-input
            id="reg-name"
            label="Nombre Completo"
            type="text"
            placeholder="Tu nombre completo"
            icon="pi pi-user"
            [required]="true"
            [control]="registerForm.controls.name"
        ></app-input>
    </div>

    <div class="auth-field-wrap">
        <app-input
            id="reg-email"
            label="Correo Electrónico"
            type="email"
            placeholder="tu@email.com"
            icon="pi pi-at"
            [required]="true"
            [control]="registerForm.controls.email"
        ></app-input>
    </div>

    <div class="auth-field-wrap">
        <app-password
            id="reg-password"
            label="Contraseña"
            placeholder="••••••••"
            [required]="true"
            [toggleMask]="true"
            [feedback]="true"
            [control]="registerForm.controls.password"
        ></app-password>
    </div>

    <div class="auth-field-wrap captcha-container">
        <div class="g-recaptcha" data-sitekey="6Ldm1uQsAAAAAL5VHXzeLMFndyixG9ZoRPozvgRS" data-callback="onCaptchaSuccess"></div>
    </div>

    <button type="submit" class="btn-login" [disabled]="loading">
        <span class="btn-spinner" *ngIf="loading">
            <svg class="spin-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity:.25" />
                <path fill="currentColor" style="opacity:.75"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
            </svg>
            Registrando...
        </span>
        <span *ngIf="!loading">Registrarse</span>
    </button>

    <p class="bottom-link">¿Ya tienes cuenta?
        <a (click)="toggleMode('login')">Inicia Sesión</a>
    </p>
</form>
