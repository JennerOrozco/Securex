<form (ngSubmit)="submit()" class="form-body">
    <div class="auth-field-wrap">
        <app-input
            id="login-email"
            label="Tu correo electrónico"
            type="email"
            placeholder="tu@email.com"
            icon="pi pi-at"
            [required]="true"
            [control]="loginForm.controls.email"
        ></app-input>
    </div>

    <div class="auth-field-wrap">
        <app-password
            id="login-password"
            label="Tu contraseña de acceso"
            placeholder="••••••••"
            [required]="true"
            [toggleMask]="true"
            [feedback]="false"
            [control]="loginForm.controls.password"
        ></app-password>
    </div>

    <div class="row-options">
        <label class="remember">
            <input type="checkbox" [(ngModel)]="rememberMe" [ngModelOptions]="{standalone: true}">
            Recordarme
        </label>
        <a class="forgot-link" (click)="toggleMode('forgot-password')">¿Olvidaste tu contraseña?</a>
    </div>

    <div class="actions-wrap">
        <button type="submit" class="btn-login" [disabled]="loading">
            <span class="btn-spinner" *ngIf="loading">
                <svg class="spin-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                </svg>
                Ingresando...
            </span>
            <span *ngIf="!loading">Ingresar</span>
        </button>
    
        <button type="button" class="btn-biometric" (click)="biometricLogin()" [disabled]="loading" title="Iniciar sesión con Huella">
            <i class="fa-solid fa-fingerprint"></i>
        </button>
    </div>

    <div class="divider"><span>O INGRESA CON</span></div>

    <div class="google-wrap">
        <div id="google-btn"></div>
    </div>

    <p class="bottom-link">¿Aún no tienes acceso?
        <a (click)="toggleMode('register')">Regístrate</a>
    </p>
</form>
