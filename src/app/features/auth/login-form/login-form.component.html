<form (ngSubmit)="submit()" class="form-body">
    <div class="auth-field-wrap">
        <app-input
            id="login-email"
            label="Tu correo electrónico"
            type="email"
            placeholder="tu@email.com"
            icon="pi pi-at"
            [required]="true"
            [control]="loginForm.controls.email"
        ></app-input>
    </div>

    <div class="auth-field-wrap">
        <app-password
            id="login-password"
            label="Tu contraseña de acceso"
            placeholder="••••••••"
            [required]="true"
            [toggleMask]="true"
            [feedback]="false"
            [control]="loginForm.controls.password"
        ></app-password>
    </div>

    <div class="row-options">
        <label class="remember">
            <input type="checkbox" [(ngModel)]="rememberMe" [ngModelOptions]="{standalone: true}">
            Recordarme
        </label>
        <a class="forgot-link" (click)="toggleMode('forgot-password')">¿Olvidaste tu contraseña?</a>
    </div>

    <div class="actions-wrap">
        <app-submit-button [loading]="loading" label="Ingresar" loadingLabel="Ingresando..."></app-submit-button>

        <button type="button" class="btn-biometric" (click)="biometricLogin()" [disabled]="loading" title="Iniciar sesión con Huella">
            <i class="fa-solid fa-fingerprint"></i>
        </button>
    </div>

    <div class="divider"><span>O INGRESA CON</span></div>

    <div class="google-wrap">
        <div id="google-btn"></div>
    </div>

    <app-auth-bottom-link prefix="¿Aún no tienes acceso?" linkText="Regístrate" mode="register" (onToggle)="toggleMode($event)"></app-auth-bottom-link>
</form>
