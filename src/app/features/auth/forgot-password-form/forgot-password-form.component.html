<form (submit)="submit($event)" class="form-body">
    <div class="auth-field-wrap" style="margin-bottom: 24px;">
        <app-input
            id="reset-email"
            label="Tu correo electrónico"
            type="email"
            placeholder="tu@email.com"
            icon="pi pi-at"
            [required]="true"
            [control]="emailControl"
        ></app-input>
    </div>

    <button type="submit" class="btn-login" [disabled]="loading">
        <span class="btn-spinner" *ngIf="loading">
            <svg class="spin-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity:.25" />
                <path fill="currentColor" style="opacity:.75"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
            </svg>
            Enviando...
        </span>
        <span *ngIf="!loading">Enviar enlace de recuperación</span>
    </button>

    <p class="bottom-link">
        <a (click)="toggleMode('login')">← Volver al inicio de sesión</a>
    </p>
</form>
