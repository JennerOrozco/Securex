<form (submit)="submit($event)" class="form-body">
    <div class="auth-field-wrap">
        <app-input
            id="reset-code"
            label="Código de verificación"
            type="text"
            placeholder="Código de 6 dígitos"
            icon="pi pi-lock"
            [required]="true"
            [control]="resetForm.controls.code"
        ></app-input>
    </div>

    <div class="auth-field-wrap">
        <app-password
            id="new-password"
            label="Nueva contraseña"
            placeholder="••••••••"
            [required]="true"
            [toggleMask]="true"
            [feedback]="true"
            [control]="resetForm.controls.newPassword"
        ></app-password>
    </div>

    <div class="auth-field-wrap">
        <app-password
            id="confirm-password"
            label="Confirmar contraseña"
            placeholder="••••••••"
            [required]="true"
            [toggleMask]="true"
            [feedback]="false"
            [control]="resetForm.controls.confirmNewPassword"
        ></app-password>
    </div>

    <button type="submit" class="btn-login" [disabled]="loading">
        <span class="btn-spinner" *ngIf="loading">
            <svg class="spin-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity:.25" />
                <path fill="currentColor" style="opacity:.75"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
            </svg>
            Actualizando...
        </span>
        <span *ngIf="!loading">Actualizar contraseña</span>
    </button>

    <p class="bottom-link">
        <a (click)="toggleMode('login')">← Volver al inicio de sesión</a>
    </p>
</form>
