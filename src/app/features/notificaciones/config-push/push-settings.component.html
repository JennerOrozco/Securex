<app-crud-page
  permission="securex.notifications.push"
  title="Configuraciones Push"
  subtitle="Llaves VAPID y parámetros para notificaciones web"
  [data]="items"
  [columns]="cols"
  [loading]="loading"
  [isSaving]="isSaving"
  [formFields]="formFields"
  [formExtraData]="initialData"
  formAddTitle="Nueva Configuración"
  formEditTitle="Editar Configuración"
  deleteTitle="Eliminar Configuración"
  (onSave)="save($event.data, $event.mode)"
  (onConfirmDelete)="confirmDelete()"
  (onRefresh)="load()"
  (onAdd)="handleAdd()"
  (onEdit)="handleEdit($event)"
  (onDelete)="handleDelete($event)"
>
  <div custom-toolbar-actions>
    <app-button icon="pi pi-key" label="Generar VAPID" class="p-button-navy" (onClick)="handleGenerateVapid()"></app-button>
  </div>
</app-crud-page>
