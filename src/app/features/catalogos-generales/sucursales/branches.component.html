<app-crud-page
  [isTreeTable]="true"
  title="Sucursales"
  subtitle="Organizadas por compañía"
  addLabel="Nueva Sucursal"
  [treeNodes]="treeNodes"
  [columns]="cols"
  [loading]="loading"
  [isSaving]="isSaving"
  [formFields]="formFields"
  [formExtraData]="{ company_id: currentCompanyId, is_active: 1 }"
  formAddTitle="Nueva Sucursal"
  formEditTitle="Editar Sucursal"
  deleteTitle="Eliminar Sucursal"
  [deleteMessage]="deleteMessageFn"
  permission="securex.security.branches"
  [colorRows]="true"
  [showLegend]="false"
  (onAddRoot)="handleAddRoot()"
  (onAddChild)="handleAddChild($event)"
  (onEdit)="handleEdit($event)"
  (onDelete)="handleDelete($event)"
  (onSave)="save($event)"
  (onConfirmDelete)="confirmDelete($event)"
  (onRefresh)="load()"
></app-crud-page>
