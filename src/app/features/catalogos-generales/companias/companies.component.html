<app-crud-page
  [isTreeTable]="true"
  title="Compañías"
  subtitle="Organizadas por aplicación"
  addLabel="Nueva Compañía"
  [treeNodes]="treeNodes"
  [columns]="cols"
  [loading]="loading"
  [isSaving]="isSaving"
  [formFields]="formFields"
  [formExtraData]="{ app_id: currentAppId, is_active: 1 }"
  formAddTitle="Nueva Compañía"
  formEditTitle="Editar Compañía"
  deleteTitle="Eliminar Compañía"
  [deleteMessage]="deleteMessageFn"
  [hasPermission]="hasPermission"
  permissionMessage="Solo los administradores del sistema pueden gestionar compañías."
  [hidePermissionGate]="false"
  [colorRows]="true"
  [showLegend]="false"
  (onAddRoot)="handleAddRoot()"
  (onAddChild)="handleAddChild($event)"
  (onEdit)="handleEdit($event)"
  (onDelete)="handleDelete($event)"
  (onSave)="save($event)"
  (onConfirmDelete)="confirmDelete($event)"
  (onRefresh)="load()"
></app-crud-page>
