<div class="p-2">
  <div *ngIf="!hasPermission" class="access-denied">
    <i class="pi pi-lock" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
    <h2>Acceso restringido</h2>
    <p>Solo los administradores del sistema pueden gestionar compañías.</p>
  </div>

  <ng-container *ngIf="hasPermission">
    <app-tree-table-component title="Compañías" subtitle="Organizadas por aplicación"
      [nodes]="treeNodes" [columns]="cols" [loading]="loading"
      [showAdd]="true" addLabel="Nueva Compañía" [showLegend]="false"
      [colorRows]="true"
      (onAddRoot)="handleAddRoot()" (onAddChild)="handleAddChild($event)"
      (onEdit)="handleEdit($event)" (onDelete)="handleDelete($event)">
    </app-tree-table-component>
  </ng-container>

  <app-form-modal
    [visible]="modalVisible && modalMode !== 'delete'"
    [mode]="modalMode === 'add' ? 'add' : 'edit'"
    title="{{ modalMode === 'add' ? 'Nueva Compañía' : 'Editar Compañía' }}"
    [fields]="formFields"
    [data]="modalMode === 'edit' ? selectedItem : null"
    [initialData]="modalMode === 'add' ? { app_id: currentAppId, is_active: 1 } : {}"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-form-modal>

  <app-delete-modal [visible]="modalVisible && modalMode === 'delete'" title="Eliminar Compañía"
    [bodyMessage]="'¿Está seguro de que desea eliminar la compañía ' + selectedItem?.name + '?'" [loading]="isSaving"
    (onConfirm)="confirmDelete()" (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
