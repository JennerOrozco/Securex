<div class="p-2">
  <div *ngIf="!hasPermission" class="access-denied">
    <i class="pi pi-lock" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
    <h2>Acceso restringido</h2>
    <p>Solo los administradores del sistema pueden gestionar sucursales.</p>
  </div>

  <ng-container *ngIf="hasPermission">
    <app-table-component
      title="Sucursales"
      subtitle="Organizadas por compañía"
      [data]="tableData"
      [columns]="cols"
      [loading]="loading"
      [showAdd]="true"
      [showEdit]="true"
      [showDelete]="true"
      addLabel="Nueva Sucursal"
      searchPlaceholder="Buscar sucursal..."
      [enableRowGroup]="true"
      groupRowsBy="company_name"
      groupHeaderLabel="Compañía:"
      [showAddChild]="true"
      [expandableRowGroups]="true"
      (onAdd)="handleAdd()"
      (onAddChild)="handleAddChild($event.company_id)"
      (onEdit)="handleEdit($event)"
      (onDelete)="handleDelete($event)">
    </app-table-component>
  </ng-container>

  <app-form-modal
    [visible]="modalVisible && modalMode !== 'delete'"
    [mode]="modalMode === 'add' ? 'add' : 'edit'"
    title="{{ modalMode === 'add' ? 'Nueva Sucursal' : 'Editar Sucursal' }}"
    [fields]="formFields"
    [data]="modalMode === 'edit' ? selectedItem : null"
    [initialData]="modalMode === 'add' ? (preselectedCompanyId ? { company_id: preselectedCompanyId, is_active: 1 } : { is_active: 1 }) : {}"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-form-modal>

  <app-delete-modal
    [visible]="modalVisible && modalMode === 'delete'"
    title="Eliminar Sucursal"
    [bodyMessage]="'¿Está seguro de que desea eliminar la sucursal ' + selectedItem?.name + '?'"
    [loading]="isSaving"
    (onConfirm)="confirmDelete()"
    (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
