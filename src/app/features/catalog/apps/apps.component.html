<div class="p-2">
  <div *ngIf="!hasPermission" class="access-denied">
    <i class="pi pi-lock" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
    <h2>Acceso restringido</h2>
    <p>Solo los administradores del sistema pueden gestionar aplicaciones.</p>
  </div>

  <ng-container *ngIf="hasPermission">
    <app-table-component title="Aplicaciones" subtitle="Catálogo de aplicaciones del ecosistema"
      [data]="data" [columns]="cols" [loading]="loading" [showAdd]="true" [showEdit]="true" [showDelete]="true" addLabel="Nueva"
      (onAdd)="handleAdd()" (onEdit)="handleEdit($event)"
      (onDelete)="handleDelete($event)">
    </app-table-component>
  </ng-container>

  <app-add-modal [visible]="modalVisible && modalMode === 'add'" title="Nueva Aplicación" [fields]="formFields"
    [loading]="isSaving" (onConfirm)="save($event)" (onClose)="modalVisible = false">
  </app-add-modal>

  <app-edit-modal [visible]="modalVisible && modalMode === 'edit'" title="Editar Aplicación" [fields]="formFields"
    [data]="selectedItem" [loading]="isSaving" (onConfirm)="save($event)" (onClose)="modalVisible = false">
  </app-edit-modal>

  <app-delete-modal [visible]="modalVisible && modalMode === 'delete'" title="Eliminar Aplicación" [loading]="isSaving"
    (onConfirm)="confirmDelete()" (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
