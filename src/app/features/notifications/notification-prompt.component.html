<div *ngIf="showPrompt"
    class="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-96 bg-white/90 backdrop-blur-md border border-padel-teal/20 p-4 rounded-2xl shadow-2xl z-50 animate-fade-in-up">
    <div class="flex items-start gap-4">
        <div class="bg-padel-teal/10 p-3 rounded-full shrink-0">
            <svg class="w-6 h-6 text-padel-teal" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                </path>
            </svg>
        </div>
        <div class="flex-1">
            <h3 class="font-bold text-gray-900">¿Te avisamos de los partidos?</h3>
            <p class="text-sm text-gray-600 mt-1">Activa las notificaciones para saber cuándo te toca jugar o cuando se
                publiquen resultados.</p>

            <div class="mt-4 flex gap-3">
                <button (click)="enableNotifications()"
                    class="flex-1 bg-padel-teal text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-padel-teal-dark transition shadow-lg shadow-padel-teal/30">
                    Activar
                </button>
                <button (click)="close()"
                    class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition">
                    Ahora no
                </button>
            </div>
        </div>
        <button (click)="close()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
</div>
