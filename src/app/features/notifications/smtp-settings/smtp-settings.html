<app-crud-page
  permission="securex.notifications.smtp"
  title="Configuraciones SMTP"
  subtitle="Servidores y credenciales para envío de emails"
  [data]="items"
  [columns]="cols"
  [loading]="loading"
  [isSaving]="isSaving"
  [formFields]="formFields"
  formAddTitle="Nueva Configuración SMTP"
  formEditTitle="Editar Configuración SMTP"
  deleteTitle="Eliminar Configuración"
  deleteMessage="¿Estás seguro de eliminar esta configuración?"
  (onSave)="save($event.data, $event.mode)"
  (onConfirmDelete)="confirmDelete()"
  (onRefresh)="load()"
  (onAdd)="handleAdd()"
  (onEdit)="handleEdit($event)"
  (onDelete)="handleDelete($event)"
></app-crud-page>
