<div class="px-4 pb-4 animate-fade-in" *ngIf="hasPermission">
  <app-table-component title="Reseteos de Contraseña"
    description="Historial de solicitudes de reseteo de contraseñas de los usuarios" [data]="data" [columns]="cols"
    [loading]="loading" [showDelete]="true" (onRefresh)="load()"
    (onDelete)="handleDelete($event)"></app-table-component>
</div>

<div class="px-4 pb-4 animate-fade-in" *ngIf="!hasPermission">
  <div
    class="p-8 text-center bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
    <i class="pi pi-lock text-4xl text-slate-400 dark:text-slate-500 mb-4"></i>
    <h3 class="text-lg font-medium text-slate-900 dark:text-white mb-2">Acceso Denegado</h3>
    <p class="text-slate-500 dark:text-slate-400">No tienes permisos para ver este módulo.</p>
  </div>
</div>

<app-delete-modal [visible]="modalVisible && modalMode === 'delete'" title="Eliminar Solicitud de Reseteo"
  [bodyMessage]="'¿Estás seguro de eliminar el registro de reseteo de contraseña para ' + (selectedItem?.email || 'este usuario') + '?'"
  [loading]="isSaving" (onConfirm)="confirmDelete()" (onClose)="modalVisible = false"></app-delete-modal>
