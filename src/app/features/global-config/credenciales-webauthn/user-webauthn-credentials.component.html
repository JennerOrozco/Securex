<app-crud-page
  [hidePermissionGate]="true"
  title="Credenciales WebAuthn"
  subtitle="Passkeys y dispositivos registrados para autenticación biométrica"
  [data]="credentials"
  [columns]="columns"
  [loading]="loading"
  [isSaving]="isSaving"
  [showAdd]="false"
  [showEdit]="false"
  [lazy]="true"
  [totalRecords]="totalRecords"
  deleteTitle="Eliminar Credencial"
  deleteMessage="¿Estás seguro de eliminar esta credencial WebAuthn?"
  (onLazyLoad)="load($event)"
  (onConfirmDelete)="onConfirmDelete($event)"
  (onRefresh)="load()"
></app-crud-page>
