<app-crud-page
  permission="securex.security.permissions"
  permissionMessage="Solo los administradores del sistema pueden gestionar permisos."
  [isTreeTable]="true"
  [treeNodes]="crud.items()"
  [columns]="cols"
  [loading]="crud.loading()"
  [formFields]="formFields"
  [isSaving]="crud.isSaving()"
  [hasPermission]="hasPermission"
  [resourceName]="'Permiso'"
  title="Permisos"
  subtitle="Estructura jerárquica de accesos por aplicación"
  addLabel="Nuevo Permiso"
  searchPlaceholder="Buscar permiso..."
  (onAddRoot)="crud.handleAdd()"
  (onAddChild)="crud.handleAddChild($event)"
  (onEdit)="crud.handleEdit($event)"
  (onSave)="crud.save($event)"
  (onConfirmDelete)="crud.confirmDelete($event)"
></app-crud-page>
