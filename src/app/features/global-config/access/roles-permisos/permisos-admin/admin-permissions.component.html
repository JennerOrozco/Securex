<app-crud-page
  permission="securex.security.permissions"
  permissionMessage="Solo los administradores del sistema pueden gestionar permisos."
  [isTreeTable]="true"
  [treeNodes]="treeNodes"
  [columns]="cols"
  [loading]="loading"
  [formFields]="formFields"
  [isSaving]="isSaving"
  [hasPermission]="hasPermission"
  title="Permisos"
  subtitle="Estructura jerárquica de accesos por aplicación"
  addLabel="Nuevo Permiso"
  searchPlaceholder="Buscar permiso..."
  formAddTitle="Nuevo Permiso"
  formEditTitle="Editar Permiso"
  deleteTitle="Eliminar Permiso"
  (onAddRoot)="setRootAdd()"
  (onAddChild)="setChildAdd($event)"
  (onSave)="handleSave($event)"
  (onConfirmDelete)="handleDelete($event)"
></app-crud-page>
