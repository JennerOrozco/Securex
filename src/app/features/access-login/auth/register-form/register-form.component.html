<form (ngSubmit)="submit()" class="form-body">
    <div class="auth-field-wrap">
        <app-input
            id="reg-name"
            label="Nombre Completo"
            type="text"
            placeholder="Tu nombre completo"
            icon="pi pi-user"
            [required]="true"
            [control]="registerForm.controls.name"
        ></app-input>
    </div>

    <div class="auth-field-wrap">
        <app-input
            id="reg-email"
            label="Correo Electrónico"
            type="email"
            placeholder="tu@email.com"
            icon="pi pi-at"
            [required]="true"
            [control]="registerForm.controls.email"
        ></app-input>
    </div>

    <div class="auth-field-wrap">
        <app-password
            id="reg-password"
            label="Contraseña"
            placeholder="••••••••"
            [required]="true"
            [toggleMask]="true"
            [feedback]="true"
            [control]="registerForm.controls.password"
        ></app-password>
    </div>

    <div class="auth-field-wrap captcha-container">
        <div class="g-recaptcha" data-sitekey="6Ldm1uQsAAAAAL5VHXzeLMFndyixG9ZoRPozvgRS" data-callback="onCaptchaSuccess"></div>
    </div>

    <app-submit-button [loading]="loading" label="Registrarse" loadingLabel="Registrando..."></app-submit-button>

    <app-auth-bottom-link prefix="¿Ya tienes cuenta?" linkText="Inicia Sesión" mode="login" (onToggle)="toggleMode($event)"></app-auth-bottom-link>
</form>
