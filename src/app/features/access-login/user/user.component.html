<app-crud-page title="Accesos de Usuarios" subtitle="Sucursales y roles filtrados por tu compañía activa"
  [columns]="cols" [data]="accesses" [loading]="loading" [lazy]="true" [totalRecords]="totalRecords" [showAdd]="true"
  [showEdit]="true" [showDelete]="true" [showReset]="true" [formFields]="formFields" formAddTitle="Nuevo Acceso"
  formEditTitle="Editar Acceso" [isSaving]="isSaving" [formExtraData]="formInitialData"
  deleteMessage="¿Estás seguro de eliminar este acceso? El usuario perderá el rol en esta compañía/sucursal."
  (onAdd)="handleAdd()" (onEdit)="handleEdit($event)" (onSave)="save($event)" (onConfirmDelete)="confirmDelete($event)"
  (onReset)="handleResetPassword($event)" (onRefresh)="load()" (onLazyLoad)="load($event)"
  (onSelectGridEmptyFilter)="onSelectGridEmptyFilter()"></app-crud-page>

<app-reset-password-modal [(visible)]="resetModalVisible" [userEmail]="resetModalItem?.user?.email || ''"
  [userName]="resetModalItem?.user?.full_name || ''" (onClose)="closeResetModal()">
</app-reset-password-modal>
