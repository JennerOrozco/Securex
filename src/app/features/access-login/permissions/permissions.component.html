<app-crud-page
  [isTreeTable]="true"
  [treeNodes]="treeData"
  [columns]="cols"
  [loading]="loading"
  [formFields]="formFields"
  [isSaving]="isSaving"
  [dragdrop]="true"
  [resourceName]="resourceName"
  title="Gestión de Permisos"
  subtitle="Estructura jerárquica de accesos, menús y acciones del ecosistema."
  addLabel="Nuevo Módulo Raíz"
  searchPlaceholder="Buscar slug o nombre..."
  [showLegend]="true"
  (onAddRoot)="handleAddRoot()"
  (onAddChild)="handleAddChild($event)"
  (onSave)="save($event)"
  (onConfirmDelete)="confirmDelete($event)"
  (onFilter)="filterTree($event)"
  (onFilterType)="filterByType($event)"
  (onNodeReorder)="handleNodeReorder($event)"
></app-crud-page>
