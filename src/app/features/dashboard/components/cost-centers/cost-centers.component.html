<div class="flex justify-end mb-2">
  <div class="flex gap-1">
    @for (lvl of levels; track lvl.value) {
      <button
        (click)="changeLevel(lvl.value)"
        class="frequency-btn"
        [class.active]="currentLevel === lvl.value">
        {{ lvl.label }}
      </button>
    }
  </div>
</div>

<app-table-component
  [data]="data"
  [columns]="columns"
  [title]="'Centros de Costo'"
  [subtitle]="'Distribución por jerarquía'"
  [showAdd]="false"
  [showEdit]="false"
  [showDelete]="false"
  [rows]="5">
</app-table-component>
