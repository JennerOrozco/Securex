<div class="section-card">
  <div class="section-card-header">
    <div>
      <h3 class="section-card-title">Ventas por Categoría</h3>
      <p class="section-card-subtitle">Distribución por categoría de venta</p>
    </div>
    <i class="pi pi-chart-pie text-cyan-500"></i>
  </div>
  @if (data) {
    <p-chart type="doughnut" [data]="data" [options]="options" height="300px"></p-chart>
  } @else {
    <div class="empty-state">
      <i class="pi pi-spin pi-spinner mr-2"></i> Cargando datos...
    </div>
  }
</div>
