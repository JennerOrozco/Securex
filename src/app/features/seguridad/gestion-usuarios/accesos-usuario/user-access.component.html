<app-crud-page
  title="Accesos de Usuario"
  subtitle="Gestión de accesos a aplicaciones"
  [data]="records"
  [columns]="cols"
  [loading]="loading"
  [isSaving]="isSaving"
  [showAdd]="true"
  [showEdit]="true"
  [showDelete]="true"
  [formFields]="formFields"
  [formExtraData]="formInitialData"
  formAddTitle="Nuevo Acceso"
  formEditTitle="Editar Acceso"
  deleteTitle="Eliminar Acceso"
  deleteMessage="¿Estás seguro de eliminar este acceso? El usuario perderá el rol en esta compañía/sucursal."
  [minimalMode]="true"
  (onSave)="save($event)"
  (onConfirmDelete)="confirmDelete($event)"
  (onRefresh)="load()"
></app-crud-page>
