<app-crud-page
  [isTreeTable]="true"
  [treeNodes]="accessNodes"
  [columns]="cols"
  [loading]="loading"
  [formFields]="formFields"
  [isSaving]="isSaving"
  [catalogLoading]="catalogLoading"
  [formExtraData]="formExtraData"
  [formAddTitle]="'Asignar Acceso'"
  [formEditTitle]="'Editar Acceso'"
  [mapItemForEdit]="mapItemForEdit"
  title="Accesos de Usuario"
  subtitle="Jerarquía de aplicaciones, compañías, sucursales y usuarios asignados."
  addLabel="Asignar Acceso"
  searchPlaceholder="Buscar usuario, rol o nodo..."
  [showLegend]="false"
  [showAdd]="false"
  [colorRows]="true"
  deleteTitle="Eliminar acceso"
  deleteMessage="¿Está seguro de que desea eliminar este acceso?"
  (onAddChild)="handleAddUnderBranch($event)"
  (onEdit)="handleEdit($event)"
  (onSave)="handleSave($event)"
  (onConfirmDelete)="handleDelete($event)"
  (onFilter)="filterTree($event)"
></app-crud-page>
