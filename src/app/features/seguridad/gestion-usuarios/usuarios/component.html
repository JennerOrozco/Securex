<app-crud-page
  title="Accesos de Usuarios"
  subtitle="Sucursales y roles filtrados por tu compañía activa"
  [columns]="cols"
  [data]="accesses"
  [loading]="loading"
  [showAdd]="true"
  [showEdit]="true"
  [showDelete]="true"
  [showReset]="true"
  [formFields]="formFields"
  formAddTitle="Nuevo Acceso"
  formEditTitle="Editar Acceso"
  [isSaving]="isSaving"
  [formExtraData]="formInitialData"
  [mapItemForEdit]="mapItemForEdit"
  deleteMessage="¿Estás seguro de eliminar este acceso? El usuario perderá el rol en esta compañía/sucursal."
  (onSave)="save($event)"
  (onConfirmDelete)="confirmDelete($event)"
  (onReset)="handleResetPassword($event)"
  (onRefresh)="load()"
  (onSelectGridEmptyFilter)="onSelectGridEmptyFilter()"
></app-crud-page>

<app-reset-password-modal
  [visible]="resetModalVisible"
  [userEmail]="resetModalItem?.user_email || ''"
  [userName]="resetModalItem?.user_name || ''"
  [loading]="resetModalLoading"
  (onConfirm)="confirmResetPassword()"
  (onClose)="closeResetModal()">
</app-reset-password-modal>
