<div class="p-2">
  <div *ngIf="!hasPermission" class="access-denied">
    <i class="pi pi-lock" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
    <h2>Acceso restringido</h2>
    <p>Solo los administradores del sistema pueden gestionar los permisos de compa&ntilde;&iacute;as.</p>
  </div>

  <ng-container *ngIf="hasPermission">
    <div class="perm-card">
      <!-- Toolbar Header -->
      <app-toolbar
        title="Permisos por Compañía"
        subtitle="Seleccione la aplicación y la compañía para administrar los permisos."
        [showSearch]="false"
        [showAdd]="false"
      >
        <div toolbar-actions>
          <app-button
            *ngIf="selectedCompanyId && groups.length > 0"
            [label]="isSaving ? 'Guardando...' : 'Guardar Permisos'"
            [icon]="isSaving ? 'pi pi-spinner animate-spin' : 'pi pi-save'"
            [disabled]="isSaving"
            class="p-button-navy"
            (onClick)="savePermissions()">
          </app-button>
        </div>
      </app-toolbar>

      <!-- Selectors Bar -->
      <div class="selectors-bar">
        <div class="selector-group">
          <label class="selector-label">Aplicaci&oacute;n</label>
          <app-select
            id="app-select"
            placeholder="Seleccione una Aplicaci&oacute;n"
            [options]="apps"
            optionLabel="name"
            optionValue="id"
            [control]="appControl"
            icon="pi pi-window-maximize">
          </app-select>
        </div>

        <div class="selector-group">
          <label class="selector-label">Compa&ntilde;&iacute;a</label>
          <app-select
            id="company-select"
            placeholder="Seleccione una Compa&ntilde;&iacute;a"
            [options]="companies"
            optionLabel="name"
            optionValue="id"
            [control]="companyControl"
            icon="pi pi-building">
          </app-select>
        </div>
      </div>

      <!-- Loading -->
      <div *ngIf="loading" class="flex flex-col items-center justify-center p-20 gap-4">
        <div class="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
        <span class="text-xs font-medium text-slate-500">Cargando...</span>
      </div>

      <!-- Empty State: No Company Selected -->
      <div *ngIf="selectedAppId && !selectedCompanyId && !loading" class="empty-state">
        <i class="pi pi-building text-4xl text-slate-300 mb-3"></i>
        <p class="text-slate-500 font-medium">Seleccione una compa&ntilde;&iacute;a para gestionar sus permisos.</p>
      </div>

      <!-- Permission Tree -->
      <app-permission-tree
        *ngIf="selectedCompanyId && !loading && groups.length > 0"
        [groups]="groups"
        [selectedIds]="selectedIds"
        [loading]="false"
        (selectedIdsChange)="onSelectionChange($event)">
      </app-permission-tree>

      <!-- Empty state: no permissions for app -->
      <div *ngIf="selectedCompanyId && !loading && groups.length === 0" class="empty-state">
        <i class="pi pi-folder-open text-4xl text-slate-300 mb-3"></i>
        <p class="text-slate-500 font-medium">No hay permisos disponibles para esta aplicaci&oacute;n.</p>
      </div>
    </div>
  </ng-container>
</div>
