<app-crud-page
  permission="securex.security.users"
  title="Usuarios"
  subtitle="Todos los usuarios del sistema"
  [data]="users"
  [columns]="cols"
  [loading]="loading"
  [isSaving]="isSaving"
  [formFields]="formFields"
  formAddTitle="Nuevo Usuario"
  formEditTitle="Editar Usuario"
  deleteTitle="Eliminar Usuario"
  (onSave)="onSave($event)"
  (onConfirmDelete)="onConfirmDelete($event)"

></app-crud-page>
