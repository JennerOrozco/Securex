<div class="p-2">
  <div *ngIf="!hasPermission" class="access-denied">
    <i class="pi pi-lock" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
    <h2>Acceso restringido</h2>
    <p>Solo los administradores del sistema pueden gestionar usuarios.</p>
  </div>

  <ng-container *ngIf="hasPermission">
    <app-table-component
      title="Usuarios"
      subtitle="Todos los usuarios del sistema"
      [columns]="cols"
      [data]="users"
      [loading]="loading"
      (onAdd)="handleAdd()"
      (onEdit)="handleEdit($event)"
      (onDelete)="handleDelete($event)">
    </app-table-component>
  </ng-container>

  <app-add-modal
    [visible]="modalVisible && modalMode === 'add'"
    title="Nuevo Usuario"
    [fields]="formFields"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-add-modal>

  <app-edit-modal
    [visible]="modalVisible && modalMode === 'edit'"
    title="Editar Usuario"
    [fields]="formFields"
    [data]="selectedItem"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-edit-modal>

  <app-delete-modal
    [visible]="modalVisible && modalMode === 'delete'"
    title="Eliminar Usuario"
    [loading]="isSaving"
    (onConfirm)="confirmDelete()"
    (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
