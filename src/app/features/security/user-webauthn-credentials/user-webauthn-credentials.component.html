<div class="p-2">
  <app-table-component
    title="Credenciales WebAuthn"
    subtitle="Gestión de llaves de seguridad y datos biométricos registrados por los usuarios"
    [columns]="columns"
    [data]="credentials"
    [loading]="loading"
    [showAdd]="false"
    [showEdit]="false"
    (onDelete)="handleDelete($event)"
  ></app-table-component>

  <app-delete-modal
    [visible]="modalVisible"
    title="Eliminar Credencial WebAuthn"
    [bodyMessage]="'¿Estás seguro de eliminar el dispositivo \'' + (selectedItem?.device_name || 'Desconocido') + '\' del usuario \'' + (selectedItem?.user_name || selectedItem?.email || 'desconocido') + '\'?'"
    [loading]="isSaving"
    (onConfirm)="confirmDelete()"
    (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
