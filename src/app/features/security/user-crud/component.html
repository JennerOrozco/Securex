<div class="p-2">
  <app-table-component
    title="Gestión de Usuarios"
    subtitle="Administra los accesos y roles de los usuarios en tu empresa"
    [columns]="cols"
    [data]="users"
    [loading]="loading"
    [showAdd]="true"
    [showEdit]="true"
    [showDelete]="true"
    (onAdd)="handleAdd()"
    (onEdit)="handleEdit($event)"
    (onDelete)="handleDelete($event)">
  </app-table-component>

  <app-form-modal
    [visible]="modalVisible && modalMode !== 'delete'"
    [mode]="modalMode === 'add' ? 'add' : 'edit'"
    title="{{ modalMode === 'add' ? 'Invitar Usuario' : 'Cambiar Rol de Usuario' }}"
    [fields]="modalMode === 'add' ? addFormFields : editFormFields"
    [data]="modalMode === 'edit' ? selectedItem : null"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-form-modal>

  <app-delete-modal
    [visible]="modalVisible && modalMode === 'delete'"
    title="Eliminar Acceso"
    [loading]="isSaving"
    (onConfirm)="confirmDelete()"
    (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
