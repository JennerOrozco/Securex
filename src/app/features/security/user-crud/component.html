<div class="p-2">
  <app-table-component
    title="Gestión de Usuarios"
    subtitle="Administra los accesos y roles de los usuarios en tu empresa"
    [columns]="cols"
    [data]="users"
    [loading]="loading"
    [showAdd]="true"
    [showEdit]="true"
    [showDelete]="true"
    (onAdd)="handleAdd()"
    (onEdit)="handleEdit($event)"
    (onDelete)="handleDelete($event)">
  </app-table-component>

  <app-add-modal
    [visible]="modalVisible && modalMode === 'add'"
    title="Invitar Usuario"
    [fields]="addFormFields"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-add-modal>

  <app-edit-modal
    [visible]="modalVisible && modalMode === 'edit'"
    title="Cambiar Rol de Usuario"
    [fields]="editFormFields"
    [data]="selectedItem"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-edit-modal>

  <app-delete-modal
    [visible]="modalVisible && modalMode === 'delete'"
    title="Eliminar Acceso"
    [loading]="isSaving"
    (onConfirm)="confirmDelete()"
    (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
