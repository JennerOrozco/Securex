<div class="p-1 md:p-2">
  <app-tree-table-component
    title="Accesos de Usuario"
    subtitle="Jerarquía de aplicaciones, compañías, sucursales y usuarios asignados."
    [nodes]="accessNodes"
    [columns]="cols"
    [loading]="loading"
    [showLegend]="false"
    [showAdd]="false"
    [colorRows]="true"
    [addLabel]="'Asignar Acceso'"
    searchPlaceholder="Buscar usuario, rol o nodo..."
    (onAddChild)="handleAddUnderBranch($event)"
    (onEdit)="handleEdit($event)"
    (onDelete)="handleDelete($event)"
    (onFilter)="filterTree($event)">
  </app-tree-table-component>

  <app-form-modal
    [visible]="modalVisible && modalMode !== 'delete'"
    [mode]="modalMode === 'add' ? 'add' : 'edit'"
    title="{{ modalMode === 'add' ? 'Editar Acceso' : 'Editar Acceso' }}"
    [fields]="formFields"
    [data]="modalMode === 'edit' ? selectedItem : null"
    [initialData]="modalMode === 'add' ? selectedItem : {}"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-form-modal>

  <app-delete-modal
    [visible]="modalVisible && modalMode === 'delete'"
    [title]="'Eliminar acceso'"
    [bodyMessage]="'¿Está seguro de que desea eliminar este acceso?'"
    [loading]="isSaving"
    (onConfirm)="confirmDelete()"
    (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
