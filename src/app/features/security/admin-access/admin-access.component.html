<div class="page-container">
  <div *ngIf="!hasPermission" class="access-denied">
    <i class="pi pi-lock" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
    <h2>Acceso restringido</h2>
    <p>Solo los administradores del sistema pueden gestionar accesos.</p>
  </div>

  <ng-container *ngIf="hasPermission">


    <app-table-component title="Accesos de Usuario" subtitle="Organizados por compañía" [data]="tableData"
      [columns]="cols" [loading]="loading" [showAdd]="true" [showEdit]="true" [showDelete]="true"
      addLabel="Asignar Acceso" searchPlaceholder="Buscar acceso..." [enableRowGroup]="true" groupRowsBy="company_name"
      groupHeaderLabel="Compañía:" [showAddChild]="true" [expandableRowGroups]="true" (onAdd)="handleAdd()"
      (onAddChild)="handleAddChild($event.company_id)" (onEdit)="handleEdit($event)" (onDelete)="handleDelete($event)">
    </app-table-component>
  </ng-container>

  <app-add-modal [visible]="modalVisible && modalMode === 'add'" title="Asignar Acceso" [fields]="formFields"
    [initialData]="preselectedCompanyId ? { company_id: preselectedCompanyId } : {}" [loading]="isSaving"
    (onConfirm)="save($event)" (onClose)="modalVisible = false">
  </app-add-modal>

  <app-edit-modal [visible]="modalVisible && modalMode === 'edit'" title="Editar Acceso" [fields]="formFields"
    [data]="selectedItem" [loading]="isSaving" (onConfirm)="save($event)" (onClose)="modalVisible = false">
  </app-edit-modal>

  <app-delete-modal [visible]="modalVisible && modalMode === 'delete'" title="Eliminar Acceso"
    [bodyMessage]="'¿Está seguro de que desea eliminar el acceso de ' + selectedItem?.user_name + '?'"
    [loading]="isSaving" (onConfirm)="confirmDelete()" (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
