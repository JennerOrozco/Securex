<div class="p-2">
  <app-table-component title="Accesos de Usuario" subtitle="Gestión de accesos a aplicaciones"
    [columns]="cols" [data]="records" [loading]="loading" [minimalMode]="true" (onAdd)="handleAdd()" (onEdit)="handleEdit($event)"
    (onDelete)="handleDelete($event)">
  </app-table-component>

  <app-form-modal
    [visible]="modalVisible && modalMode !== 'delete'"
    [mode]="modalMode === 'add' ? 'add' : 'edit'"
    title="{{ modalMode === 'add' ? 'Nuevo Acceso' : 'Editar Acceso' }}"
    [fields]="formFields"
    [data]="modalMode === 'edit' ? selectedItem : null"
    [loading]="isSaving"
    (onConfirm)="save($event)"
    (onClose)="modalVisible = false">
  </app-form-modal>

  <app-delete-modal [visible]="modalVisible && modalMode === 'delete'" title="Eliminar Acceso" [loading]="isSaving"
    (onConfirm)="confirmDelete()" (onClose)="modalVisible = false">
  </app-delete-modal>
</div>
