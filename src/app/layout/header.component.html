<header class="hidden md:block " style=" background: linear-gradient(169deg, #490606 0%, #000000 100%);">
    <nav class=" w-full px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-14">

            <div class="flex items-center space-x-2 cursor-pointer group" (click)="navigateTo('/')">
            </div>

            <div class="hidden md:flex items-center space-x-3 lg:space-x-6">

                <div
                    class="hidden lg:flex items-center bg-white/5 border border-white/10 rounded-full px-4 py-2 focus-within:bg-white/10 focus-within:border-padel-orange/50 focus-within:ring-4 focus-within:ring-padel-orange/10 transition-all duration-300 group">
                    <svg class="w-4 h-4 text-gray-400 group-focus-within:text-padel-orange transition-colors duration-300"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" placeholder="Buscar..."
                        class="bg-transparent border-none focus:ring-0 text-sm text-white w-28 focus:w-56 transition-all duration-300 placeholder-gray-500 ml-2 outline-none">
                </div>

                <button (click)="toggleFullscreen()"
                    class="text-gray-300 hover:text-white p-2 rounded-full hover:bg-white/10 transition-all duration-200">
                    <svg *ngIf="!isFullscreen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                    </svg>
                    <svg *ngIf="isFullscreen" class="w-5 h-5 text-padel-orange" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 14h6m0 0v6m0-6l-7 7m17-7h-6m0 0v6m0-6l7 7M10 4v6m0 0H4m6 0L3 3m11 1v6m0 0h6m-6 0l7-7" />
                    </svg>
                </button>

                <div class="relative">
                    <button (click)="toggleNotifications()"
                        class="text-gray-300 hover:text-white relative p-2 rounded-full hover:bg-white/10 transition focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                            </path>
                        </svg>
                        <span *ngIf="unreadCount > 0"
                            class="absolute top-1 right-1 block h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-gray-900 animate-pulse"></span>
                    </button>

                    <div *ngIf="showNotifications"
                        class="absolute right-0 mt-3 w-[28rem] bg-gray-900 border border-gray-700 rounded-xl shadow-2xl py-2 overflow-hidden z-50 animate-fade-in origin-top-right">
                        <div class="px-4 py-2 border-b border-gray-800 flex justify-between items-center bg-black/20">
                            <h3 class="text-sm font-bold text-white">Notificaciones</h3>
                            <span (click)="markAllAsRead()"
                                class="text-xs text-padel-orange cursor-pointer hover:underline">Marcar todas</span>
                        </div>
                        <div class="max-h-96 overflow-y-auto">
                            <div *ngFor="let notif of notifications" (click)="markAsRead(notif.id)"
                                class="px-4 py-3 hover:bg-white/5 transition cursor-pointer border-b border-gray-800 last:border-0"
                                [class.bg-blue-500/5]="!notif.is_read">
                                <div class="flex justify-between items-start">
                                    <p class="text-sm font-semibold" [class.text-white]="notif.is_read"
                                        [class.text-padel-orange]="!notif.is_read">{{ notif.title }}</p>
                                    <div class="flex items-center space-x-2">
                                        <span class="text-[10px] text-gray-500">{{ timeAgo(notif.created_at) }}</span>
                                        <button (click)="deleteNotification(notif.id, $event)"
                                            class="text-gray-500 hover:text-red-500 transition-colors" title="Eliminar">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <p class="text-xs text-gray-400 mt-0.5 line-clamp-2">{{ notif.message }}</p>
                            </div>
                            <div *ngIf="notifications.length === 0" class="px-4 py-6 text-center text-gray-500 text-sm">
                                No tienes notificaciones
                            </div>
                        </div>
                    </div>
                </div>

                <button
                    class="flex items-center group p-1 pr-3 rounded-full hover:bg-white/10 transition-all border border-transparent hover:border-white/10">
                    <div
                        class="w-7 h-7 rounded-full overflow-hidden border-2 border-white/20 shadow-sm mr-2 group-hover:scale-110 transition-transform">
                        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#4997d0" d="M0 0h170.7v512H0z" />
                            <path fill="#fff" d="M170.7 0h170.6v512H170.7z" />
                            <path fill="#4997d0" d="M341.3 0H512v512H341.3z" />
                            <path fill="#92a83e"
                                d="M256 161.4l10.3 31.7h33.3l-27 19.6 10.3 31.7-27-19.7-26.9 19.7 10.3-31.7-27-19.6h33.4z" />
                        </svg>
                    </div>
                    <span
                        class="text-xs font-bold text-gray-300 group-hover:text-white uppercase tracking-wider">ES</span>
                </button>

                <div class="h-8 w-[1px] bg-white/10 mx-2"></div>

                <div *ngIf="currentUser" class="flex items-center space-x-4">
                    <div class="text-right hidden lg:block cursor-pointer group" [routerLink]="['/perfil']">
                        <p
                            class="text-white font-bold text-sm group-hover:text-padel-orange transition-colors leading-none">
                            {{ currentUser.full_name }}
                        </p>
                        <div class="flex items-center justify-end gap-1.5 mt-1">
                            <span class="text-[10px] text-gray-400 font-medium">
                                {{ currentCompany?.name }}
                            </span>
                            <span class="w-1 h-1 rounded-full bg-gray-600"></span>
                            <span class="text-[10px] text-padel-orange font-bold uppercase tracking-tighter">
                                {{ currentBranch?.name }}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>
