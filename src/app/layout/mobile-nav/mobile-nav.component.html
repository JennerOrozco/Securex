<!-- Mobile Header -->
<header class="mobile-header">
  <div class="mobile-header-logo">
    <img src="/assets/image.png" alt="N-Consultores Logo" class="h-8 w-auto rounded-lg object-contain">
    <span class="text-lg font-bold">{{ 'SECUREX' }}</span>
  </div>
  <div class="mobile-header-actions">
    <div class="relative">
      <button class="notif-btn" (click)="notifPanel.togglePanel()" aria-label="Notificaciones">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
          </path>
        </svg>
        @if (notifPanel.unreadCount() > 0) {
        <span class="notif-badge"></span>
        }
        
        <!-- Tooltip animado estilo TikTok para notificaciones en tiempo real -->
        <app-tiktok-badge />
      </button>
    </div>
    <button class="hamburger-btn" (click)="toggleSidebar()" aria-label="Abrir menú">
      @if (sidebarOpen()) {
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
      } @else {
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      }
    </button>
  </div>
</header>

<!-- Mobile Notifications Dropdown -->
<div class="md:hidden">
  <app-notification-panel mode="mobile" />
</div>

<!-- Overlay -->
@if (sidebarOpen()) {
<div class="sidebar-overlay open" (click)="closeSidebar()"></div>
}

<!-- Bottom Navigation -->
<nav class="mobile-bottom-nav">
  <div class="mobile-nav-items">
    <div class="nav-indicator" [style.left.%]="indicatorLeft()"></div>

    @for (item of visibleMenuItems(); track $index) {
    <a [routerLink]="item.path" class="mobile-nav-item" [class.active-item]="$index === activeIndex()"
      (click)="closeSidebar()">
      <div class="nav-icon-wrap">
        @if (item.icon && (item.icon.startsWith('pi ') || item.icon.includes(' '))) {
        <i [class]="item.icon"></i>
        } @else {
        <i class="pi pi-circle"></i>
        }
      </div>
      <span>{{ item.label }}</span>
    </a>
    }
  </div>
</nav>
