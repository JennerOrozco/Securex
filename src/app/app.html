<p-toast position="top-right" [breakpoints]="{'640px':{position:'top-center',width:'90vw'}}" styleClass="app-toast">
    <ng-template let-message pTemplate="message">
        <div class="flex flex-col gap-1 w-full cursor-pointer" (click)="message.data?.route_url ? navigateTo(message.data.route_url) : null">
            <div class="flex items-center gap-2">
                <i [class]="message.icon + ' text-xl'"></i>
                <span class="font-semibold">{{ message.summary }}</span>
            </div>
            <div class="text-sm opacity-90 ml-7">{{ message.detail }}</div>
        </div>
    </ng-template>
</p-toast>
<p-confirmDialog [style]="{ width: '420px' }" />
<app-loader />
<router-outlet />
<app-install-prompt></app-install-prompt>
<app-notification-prompt></app-notification-prompt>
<app-update-prompt />
