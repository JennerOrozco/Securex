<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [appendTo]="'body'"
  [breakpoints]="{ '960px': '80vw', '768px': '92vw', '480px': '96vw' }"
  [style]="{ width: width() || (mode() === 'view' ? '520px' : (mode() === 'add' ? '550px' : '700px')) }"
  (onHide)="onClose.emit()"
  [draggable]="draggable()"
  [resizable]="resizable()"
  [styleClass]="'gm-dialog gm-dialog--' + dialogClass()"
  [class]="'gm-dialog gm-dialog--' + dialogClass()">

  <ng-template pTemplate="header">
    <div class="gm-header">
      <div class="gm-header-icon" [ngClass]="iconClass()">
        <i [class]="icon()"></i>
      </div>
      <div class="gm-header-text">
        <h2 class="gm-title">{{ title() }}</h2>
      </div>
    </div>
  </ng-template>

  <div class="gm-body gm-body--form" [class.gm-body--no-padding]="noPadding()">
    <form *ngIf="fields() && fields().length > 0" [formGroup]="form" class="gm-form" autocomplete="off" novalidate>
      <app-dynamic-form
        [fields]="fields()"
        [parentForm]="form"
        [mode]="mode()"
        [gridClass]="gridClass()"
        (onSelectGridEmptyFilter)="onSelectGridEmptyFilter.emit($event)"
      ></app-dynamic-form>
    </form>
    <ng-content></ng-content>
  </div>

  <ng-template pTemplate="footer">
    <div class="gm-footer" *ngIf="showFooter()">
      <p-button label="Cancelar" icon="pi pi-times" [text]="true" severity="secondary" styleClass="gm-btn gm-btn--cancel" (onClick)="onClose.emit()"></p-button>
      <p-button *ngIf="mode() !== 'view'"
        [label]="confirmLabel()"
        [icon]="confirmIcon()"
        [severity]="confirmSeverity()"
        [disabled]="customFormValid() !== null ? !customFormValid() : form.invalid"
        [loading]="loading()"
        styleClass="gm-btn gm-btn--confirm"
        (onClick)="handleConfirm()">
      </p-button>
      <p-button *ngIf="mode() === 'view'"
        label="Cerrar"
        icon="pi pi-times"
        severity="secondary"
        styleClass="gm-btn gm-btn--confirm"
        (onClick)="onClose.emit()">
      </p-button>
    </div>
  </ng-template>
</p-dialog>
