<app-modal-shell
  [(visible)]="visible"
  [title]="title"
  icon="pi pi-envelope"
  iconType="send"
  confirmLabel="Enviar"
  confirmIcon="pi pi-envelope"
  confirmSeverity="info"
  [loading]="loading"
  (onConfirm)="onConfirm.emit()"
  (onClose)="onClose.emit()">

  <div class="gm-send-zone">
    <div class="gm-send-icon-wrap">
      <div class="gm-send-ring gm-send-ring--3"></div>
      <div class="gm-send-ring gm-send-ring--2"></div>
      <div class="gm-send-ring gm-send-ring--1"></div>
      <i class="pi pi-envelope gm-send-icon"></i>
    </div>
    <p class="gm-send-title">¿Enviar este reporte por correo?</p>
    <p class="gm-send-sub" *ngIf="bodyMessage">{{ bodyMessage }}</p>
    <div class="gm-recipients" *ngIf="emails.length > 0">
      <p class="gm-recipients-label">Se enviará a las siguientes cuentas:</p>
      <div class="gm-recipient-chip" *ngFor="let email of emails">
        <i class="pi pi-at"></i>
        <span>{{ email }}</span>
      </div>
    </div>
    <p class="gm-send-sub gm-no-emails" *ngIf="emails.length === 0">
      No hay cuentas de correo asociadas a este reporte.
    </p>
  </div>

</app-modal-shell>
