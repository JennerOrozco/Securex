<app-modal-shell
  [(visible)]="visible"
  [title]="title"
  icon="pi pi-lock"
  iconType="info"
  confirmLabel="Enviar Código"
  confirmIcon="pi pi-lock"
  confirmSeverity="info"
  [loading]="loading"
  (onConfirm)="confirm()"
  (onClose)="onClose.emit()">

  <div class="gm-send-zone">
    <div class="gm-send-icon-wrap">
      <div class="gm-send-ring gm-send-ring--3"></div>
      <div class="gm-send-ring gm-send-ring--2"></div>
      <div class="gm-send-ring gm-send-ring--1"></div>
      <i class="pi pi-lock gm-send-icon"></i>
    </div>
    <p class="gm-send-title">¿Restablecer contraseña de este usuario?</p>
    <p class="gm-send-sub">Se enviará un código de verificación al correo registrado.</p>
    <div class="gm-recipients">
      <p class="gm-recipients-label">Correo de destino:</p>
      <div class="gm-recipient-chip">
        <i class="pi pi-at"></i>
        <span>{{ userEmail || 'No disponible' }}</span>
      </div>
    </div>
  </div>

</app-modal-shell>
