<app-modal-shell
  [(visible)]="visible"
  title="Mostrar / Ocultar Columnas"
  icon="pi pi-th-large"
  iconType="view"
  width="400px"
  confirmLabel="Aplicar"
  confirmIcon="pi pi-check"
  confirmSeverity="info"
  (onConfirm)="apply()"
  (onClose)="onClose.emit()">

  <div class="flex items-center justify-between mb-3">
    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Columnas disponibles</span>
    <span class="text-xs text-slate-500 font-medium bg-slate-100 px-2 py-0.5 rounded-full">{{ selected.length }} / {{ columns.length }}</span>
  </div>

  <div class="column-list" *ngIf="columns.length > 0">
    @for (col of columns; track $index) {
    <div class="column-item" [class.active]="isSelected(col)" (click)="toggle(col)">
      <div class="column-check" [class.checked]="isSelected(col)">
        <i class="pi pi-check" *ngIf="isSelected(col)"></i>
      </div>
      <div class="column-info">
        <span class="column-name">{{ col.header }}</span>
        <span class="column-field">{{ col.field }}</span>
      </div>
      <div class="column-type-badge" *ngIf="col.type && col.type !== 'actions'">
        <span class="type-badge" [ngClass]="'badge-' + col.type">{{ col.type }}</span>
      </div>
    </div>
    }
  </div>

  <div class="empty-columns" *ngIf="columns.length === 0">
    <i class="pi pi-info-circle text-slate-300 text-xl"></i>
    <span class="text-sm text-slate-400">No hay columnas disponibles</span>
  </div>

</app-modal-shell>
