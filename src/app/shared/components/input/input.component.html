<app-form-field [id]="id" [label]="label" [icon]="icon" [required]="required" [control]="control">
  <input
    pInputText
    [id]="id"
    class="gm-input"
    [type]="type"
    [attr.step]="step"
    [placeholder]="placeholder"
    [formControl]="control"
    (input)="onInput.emit($event)"
  />
</app-form-field>
