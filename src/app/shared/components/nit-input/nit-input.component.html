<app-form-field [id]="id" [label]="label" [icon]="icon" [required]="required" [control]="control"
  [errorMsg]="control?.errors?.['required'] ? label + ' es requerido.' : 'NIT inválido. Debe ser C/F o números con más de 4 dígitos.'">
  <input
    pInputText
    [id]="id"
    class="gm-input"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [value]="control?.value || ''"
    (input)="onNitInput($event)"
    (blur)="onBlur()"
  />
</app-form-field>
