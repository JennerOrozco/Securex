<app-form-field [id]="id" [label]="label" [icon]="icon" [required]="required" [control]="control">
  <p-password
    [id]="id"
    [formControl]="control"
    [placeholder]="placeholder"
    [feedback]="feedback"
    [toggleMask]="toggleMask"
    appendTo="body"
    (onInput)="onInput.emit($event)"
    styleClass="w-full"
    inputStyleClass="gm-input w-full"
  ></p-password>
</app-form-field>
