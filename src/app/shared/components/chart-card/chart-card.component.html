<div class="relative w-full flex flex-col bg-[var(--surface)] border border-[var(--border)] p-5 rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200 animate-fade-in" [class.loading]="loading">
  <div class="flex items-center justify-between mb-4 max-sm:flex-col max-sm:items-stretch max-sm:gap-3">
    <div class="flex flex-col gap-0.5">
      <h3 class="text-base font-semibold text-[var(--text-primary)] m-0">{{ title }}</h3>
      @if (subtitle) {
        <p class="text-xs text-[var(--text-muted)] m-0 mt-0.5">{{ subtitle }}</p>
      }
    </div>

    <ng-content select="[extra-controls]"></ng-content>
    
    @if (periods && periods.length > 0) {
      <div class="flex rounded-[var(--radius-sm)] overflow-hidden shadow-xs">
        @for (period of periods; track period) {
          <button 
            type="button" 
            class="frequency-btn rounded-none first:rounded-l-[var(--radius-sm)] last:rounded-r-[var(--radius-sm)]"
            [class.active]="activePeriod === period"
            (click)="selectPeriod(period)"
          >
            {{ period }}
          </button>
        }
      </div>
    }
  </div>

  <div class="mt-4 flex-1 relative min-h-[250px]">
    @if (loading) {
      <div class="flex items-end justify-around h-[250px] w-full p-4 border-b-2 border-[var(--color-border)]">
        <div class="w-[12%] bg-[var(--color-border)] animate-pulse rounded-t-[var(--radius-xs)] h-[40%]"></div>
        <div class="w-[12%] bg-[var(--color-border)] animate-pulse rounded-t-[var(--radius-xs)] h-[75%]"></div>
        <div class="w-[12%] bg-[var(--color-border)] animate-pulse rounded-t-[var(--radius-xs)] h-[50%]"></div>
        <div class="w-[12%] bg-[var(--color-border)] animate-pulse rounded-t-[var(--radius-xs)] h-[90%]"></div>
        <div class="w-[12%] bg-[var(--color-border)] animate-pulse rounded-t-[var(--radius-xs)] h-[60%]"></div>
      </div>
    } @else {
      @if (data) {
        <div class="h-[280px] w-full relative">
          <p-chart [type]="type" [data]="data" [options]="options" height="100%"></p-chart>
        </div>
      } @else {
        <div class="flex flex-col items-center justify-center h-[250px] text-[var(--color-text-light)] gap-2">
          <i class="pi pi-chart-bar text-3xl opacity-50"></i>
          <p class="text-[0.85rem] m-0">No hay datos disponibles para mostrar</p>
        </div>
      }
    }
  </div>
</div>
