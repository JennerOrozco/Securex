<app-form-field [id]="id" [label]="label" [icon]="icon" [required]="required" [control]="control">
  <p-datepicker
    [id]="id"
    class="gm-datepicker"
    [placeholder]="placeholder"
    [formControl]="control"
    [dateFormat]="dateFormat"
    [style]="{'width': '100%'}"
    [inputStyle]="{'width': '100%'}"
    appendTo="body"
  ></p-datepicker>
</app-form-field>
