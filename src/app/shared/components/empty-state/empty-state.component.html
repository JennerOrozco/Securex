<div class="empty-state-wrapper">
  <div class="empty-icon-wrap">
    <i [class]="icon"></i>
  </div>
  <h3 class="empty-title">{{ title }}</h3>
  @if (description) {
    <p class="empty-desc" [innerHTML]="description"></p>
  }
  <div class="empty-content">
    <ng-content></ng-content>
  </div>
</div>
