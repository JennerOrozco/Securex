  <style>
    body {
      margin: 0;
      background-color: #0b0202;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    
    .app-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at center, #1a0303 0%, #050000 100%);
      overflow: hidden;
      position: relative;
    }
    
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
      padding: 2.5rem;
      border-radius: 1.5rem;
      background: rgba(26, 4, 4, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(192, 17, 26, 0.15);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 
                  0 0 40px rgba(192, 17, 26, 0.1);
      width: 280px;
      animation: float 4s ease-in-out infinite;
    }
    
    .loader-glow {
      position: absolute;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(192, 17, 26, 0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      filter: blur(10px);
      animation: pulseGlow 2s ease-in-out infinite alternate;
    }
    
    .logo-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    
    .logo-shield {
      width: 50px;
      height: 50px;
      color: #c0111a;
      filter: drop-shadow(0 0 10px rgba(192, 17, 26, 0.6));
      animation: pulseLogo 2s ease-in-out infinite alternate;
    }
    
    .loader-brand {
      color: #ffffff;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }
    
    .spinner-wrapper {
      position: relative;
      width: 60px;
      height: 60px;
      margin-bottom: 1.5rem;
    }
    
    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top: 3px solid #c0111a;
      border-right: 3px solid rgba(192, 17, 26, 0.2);
      border-radius: 50%;
      animation: spinClockwise 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    
    .spinner-ring.inner {
      width: 80%;
      height: 80%;
      top: 10%;
      left: 10%;
      border: 3px solid transparent;
      border-bottom: 3px solid #3b82f6;
      border-left: 3px solid rgba(59, 130, 246, 0.2);
      animation: spinCounterClockwise 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    
    .loader-status {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-align: center;
      animation: pulseText 1.5s ease-in-out infinite alternate;
    }
    
    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes spinCounterClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    @keyframes pulseGlow {
      0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }
    
    @keyframes pulseLogo {
      0% { transform: scale(0.95); filter: drop-shadow(0 0 8px rgba(192, 17, 26, 0.4)); }
      100% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(192, 17, 26, 0.8)); }
    }
    
    @keyframes pulseText {
      0% { opacity: 0.5; }
      100% { opacity: 0.9; }
    }
  </style>
